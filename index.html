<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTacToe</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
    
    <style>
        :root {
            --side-length: calc(min(100vw, 100vh)*0.8*0.33333);
            --side-length-board: calc(min(100vw, 100vh)*0.8);
        }
    </style>
</head>
<body class="bg-black flex flex-col justify-center items-center h-[100vh] w-[100vw]">
    <div class="text-white text-4xl text-center" id="startText">Press Space to Start!</div>
    <div class="text-white" id="twosTurn" hidden>Player 2's Turn</div>
    <div class="grid grid-cols-3 gap-3 m-3 h-(--side-length-board) w-(--side-length-board)" id="board" hidden>
    <div class="bg-white h-full w-full rounded-sm flex items-center justify-center boardSquare"><div class=""></div></div>
    <div class="bg-white h-full w-full rounded-sm flex items-center justify-center boardSquare"><div class=""></div></div>
    <div class="bg-white h-full w-full rounded-sm flex items-center justify-center boardSquare"><div class=""></div></div>
    <div class="bg-white h-full w-full rounded-sm flex items-center justify-center boardSquare"><div class=""></div></div>
    <div class="bg-white h-full w-full rounded-sm flex items-center justify-center boardSquare"><div class=""></div></div>
    <div class="bg-white h-full w-full rounded-sm flex items-center justify-center boardSquare"><div class=""></div></div>
    <div class="bg-white h-full w-full rounded-sm flex items-center justify-center boardSquare"><div class=""></div></div>
    <div class="bg-white h-full w-full rounded-sm flex items-center justify-center boardSquare"><div class=""></div></div>
    <div class="bg-white h-full w-full rounded-sm flex items-center justify-center boardSquare"><div class=""></div></div>
    </div>
    <div class="text-white" id="onesTurn" hidden>Player 1's Turn</div>


    <script src="tictactoe.js"></script>
</body>
</html>
